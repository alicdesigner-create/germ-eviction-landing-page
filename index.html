<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Germ Eviction — Debbie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Variables ── */
    :root {
      --teal:      #2ABFBF;
      --teal-dark: #1fa8a8;
      --navy:      #1A202C;
      --red:       #E53E3E;
      --white:     #ffffff;
      --bg:        #eef1f5;
      --gray-line: #e2e8f0;
      --text:      #1A202C;
      --muted:     #718096;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Open Sans', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Page wrapper ── */
    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0 0 48px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 430px;
      background: var(--white);
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    @media (min-width: 480px) {
      .page { align-items: center; padding: 40px 16px 60px; }
      .card { border-radius: 18px; box-shadow: 0 10px 50px rgba(0,0,0,0.14); overflow: hidden; }
    }

    /* ══ 1. TOP SECTION ══════════════════════════════════════ */
    .top {
      background: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 24px 20px;
      gap: 10px;
    }

    .logo {
      height: 110px;
      width: auto;
      object-fit: contain;
    }

    .company-name {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 32px;
      color: var(--navy);
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 1.1;
    }

    .slogan {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 11px;
      color: var(--teal);
      letter-spacing: 0.18em;
      text-transform: none;
      text-align: center;
    }

    /* ══ 2. CONTACT BANNER ═══════════════════════════════════ */
    .banner {
      background: var(--navy);
      border-left: 5px solid var(--teal);
      padding: 18px 24px;
    }

    .banner-name {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 24px;
      color: var(--white);
      line-height: 1.2;
    }

    .banner-title {
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--teal);
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    /* ══ 3. MIDDLE ═══════════════════════════════════════════ */
    .middle {
      background: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 24px 16px;
      gap: 14px;
      border-bottom: 1px solid var(--gray-line);
    }

    .service-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: var(--navy);
      text-align: center;
      line-height: 1.5;
    }

    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 2px solid var(--teal);
      color: var(--teal);
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.1em;
      padding: 9px 26px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .share-btn:hover, .share-btn:active {
      background: var(--teal);
      color: var(--white);
    }

    /* ══ 4. CONTACT ROWS ══════════════════════════════════════ */
    .contact-list {
      background: var(--white);
      display: flex;
      flex-direction: column;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--gray-line);
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }

    .contact-row:last-child { border-bottom: none; }

    .contact-row:hover, .contact-row:active {
      background: #f0fafa;
    }

    .icon-circle {
      flex-shrink: 0;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--teal);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
    }

    .row-info { display: flex; flex-direction: column; gap: 3px; }

    .row-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--teal);
      text-transform: uppercase;
    }

    .row-value {
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--navy);
      line-height: 1.4;
    }

    /* ══ 5. SAVE CONTACT ══════════════════════════════════════ */
    .save-wrap {
      padding: 20px 20px 10px;
      background: var(--white);
    }

    .save-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--teal);
      color: var(--white);
      border: none;
      border-radius: 12px;
      padding: 18px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .save-btn:hover  { background: var(--teal-dark); }
    .save-btn:active { transform: scale(0.98); }

    .save-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ══ 6. FOOTER ════════════════════════════════════════════ */
    .footer {
      background: var(--white);
      text-align: center;
      padding: 12px 20px 28px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'Open Sans', sans-serif;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">

      <!-- 1. TOP -->
      <div class="top">
        <img src="images/Germevictionlogo.png" alt="Germ Eviction" class="logo" />
<p class="slogan">One visit. Total disinfection.</p>
      </div>

      <!-- 2. CONTACT BANNER -->
      <div class="banner">
        <div class="banner-name" style="text-align:center;">Debbie</div>
        <div class="banner-title" style="text-align:center;">Disinfection Specialist</div>
      </div>

      <!-- 3. MIDDLE -->
      <div class="middle">
        <p class="service-text">Professional Disinfection &amp; Sanitization Services</p>
        <button class="share-btn" onclick="shareCard()" id="shareBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          SHARE
        </button>
      </div>

      <!-- 4. CONTACT ROWS -->
      <div class="contact-list">

        <a href="tel:+13036659757" class="contact-row">
          <div class="icon-circle">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.81a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.73 2.02z"/>
            </svg>
          </div>
          <div class="row-info">
            <span class="row-label">Call Us</span>
            <span class="row-value">(303) 665-9757</span>
          </div>
        </a>

<a href="mailto:debbie@germeviction.com" class="contact-row">
          <div class="icon-circle">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
          <div class="row-info">
            <span class="row-label">Email</span>
            <span class="row-value">debbie@germeviction.com</span>
          </div>
        </a>

        <a href="https://germ-eviction-web.vercel.app/#home" target="_blank" rel="noopener" class="contact-row">
          <div class="icon-circle">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </div>
          <div class="row-info">
            <span class="row-label">Website</span>
            <span class="row-value">germeviction.com</span>
          </div>
        </a>

      </div>

      <!-- 5. SAVE CONTACT -->
      <div class="save-wrap">
        <button class="save-btn" onclick="downloadVCF()" id="saveBtn">
          <div class="save-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </div>
          SAVE CONTACT
        </button>
      </div>

      <!-- 6. FOOTER -->
      <div class="footer">
        &copy; 2025 Germ Eviction. All rights reserved.
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
