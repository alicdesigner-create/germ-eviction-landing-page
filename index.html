<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Germ Eviction — Debbie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    <div class="card">

      <!-- Logo -->
      <div class="logo-wrap">
        <img src="Images/Germevictionlogo.png" alt="Germ Eviction Logo" class="logo" />
      </div>

      <!-- Company name + slogan -->
      <div class="brand-block">
        <h1 class="company-name">GERM EVICTION</h1>
        <p class="slogan">One Visit. Total Disinfect.</p>
      </div>

      <!-- Contact banner -->
      <div class="contact-banner">
        <p class="contact-name">Debbie</p>
        <p class="contact-title">Disinfection Specialist</p>
      </div>

      <!-- Service text -->
      <p class="service-text">Professional Disinfection &amp; Sanitization Services</p>

      <!-- Share button -->
      <button class="share-btn" onclick="shareCard()" id="shareBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        Share
      </button>

      <!-- Contact rows -->
      <div class="contact-list">

        <!-- Call -->
        <a href="tel:+13036659757" class="contact-row">
          <div class="icon-circle">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.81a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.73 2.02z"/>
            </svg>
          </div>
          <div class="row-text">
            <span class="row-label">CALL US</span>
            <span class="row-value">(303) 665-9757</span>
          </div>
        </a>

        <!-- Text -->
        <a href="sms:+13036659757" class="contact-row">
          <div class="icon-circle">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <div class="row-text">
            <span class="row-label">TEXT US</span>
            <span class="row-value">(303) 665-9757</span>
          </div>
        </a>

        <!-- Email -->
        <a href="mailto:debbie@germeviction.com" class="contact-row">
          <div class="icon-circle">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
          <div class="row-text">
            <span class="row-label">EMAIL</span>
            <span class="row-value">debbie@germeviction.com</span>
          </div>
        </a>

        <!-- Address -->
        <a href="https://maps.google.com/?q=11005+Dover+St+Unit+200+Westminster+CO+80021" target="_blank" rel="noopener" class="contact-row">
          <div class="icon-circle">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
          </div>
          <div class="row-text">
            <span class="row-label">ADDRESS</span>
            <span class="row-value">11005 Dover St. Unit 200<br/>Westminster CO 80021</span>
          </div>
        </a>

        <!-- Website -->
        <a href="https://germeviction.com" target="_blank" rel="noopener" class="contact-row">
          <div class="icon-circle">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </div>
          <div class="row-text">
            <span class="row-label">WEBSITE</span>
            <span class="row-value">germeviction.com</span>
          </div>
        </a>

      </div>

      <!-- Save Contact CTA -->
      <button class="save-btn" onclick="downloadVCF()" id="saveBtn">
        SAVE CONTACT
      </button>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
